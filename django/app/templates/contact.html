{% extends 'base.html' %}
{% load static %}
{% block body %}

<style>
    body {
        margin: 0;
        padding: 0;
    }

    .header {
        width: 100%;
        background-color: #008080;
        color: white;
        text-align: center;
        padding: 40px 20px;
    }

    .header h1 {
        margin: 0;
        color: white;
    }

    .header p {
        margin-top: 8px;
        color: #e6f7f7;
    }

    .contact-container {
        width: 100%;
        max-width: 900px;
        margin: 30px auto;
        padding: 30px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    .contact-container h2 {
        text-align: center;
        color: #008080;
        margin-bottom: 20px;
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        font-weight: bold;
        color: #333;
    }

    input, textarea {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
        outline: none;
    }

    input:focus, textarea:focus {
        border-color: #008080;
    }

    textarea {
        resize: none;
    }

    button {
        width: 100%;
        padding: 12px;
        background-color: #008080;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #006666;
    }

    .contact-info {
        margin-top: 25px;
        text-align: center;
        color: #555;
    }

    .contact-info p {
        margin: 5px 0;
    }


</style>

<div class="header">
    <h1>Fresh Grocery Store</h1>
    <p>Contact Us</p>
</div>

<div class="contact-container">
    <h2>Get in Touch</h2>

    <form action="{% url 'contact' %}" method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" name="name" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" name="email" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="Enter your phone number" name="number">
        </div>

        <div class="form-group">
            <label>Message</label>
            <textarea rows="5" placeholder="Type your message here" name="message"></textarea>
        </div>

        <button type="submit">Send Message</button>
    </form>

    <div class="contact-info">
        <p>Chennai, Tamil Nadu</p>
        <p>+91 8778407705</p>
        <p>freshgrocery@gmail.com</p>
    </div>
</div>

{% endblock %}
